name: 안드로이드 APK 빌드

# 수동 실행(Actions 탭의 "Run workflow") 또는 main 푸시 시 자동 빌드.
# 결과 APK는 실행 결과 페이지 하단 Artifacts에서 다운로드.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - "README.md"
      - "docs/**"
      - "android-app/README.md"

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: Node 설치
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Java(JDK 17) 설치
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Android SDK 설치
        uses: android-actions/setup-android@v3

      - name: 웹 자산을 앱에 복사 (www/)
        run: |
          mkdir -p android-app/www
          rsync -a --delete \
            --exclude 'android-app' \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'docs' \
            --exclude 'README.md' \
            ./ android-app/www/
          echo "복사된 파일:"; ls android-app/www

      - name: Capacitor 설치
        working-directory: android-app
        run: npm install

      - name: 안드로이드 플랫폼 생성
        working-directory: android-app
        run: npx cap add android

      - name: 앱 아이콘/스플래시 생성 (실패해도 계속)
        working-directory: android-app
        run: npx @capacitor/assets generate --android || true

      - name: 웹 자산 동기화
        working-directory: android-app
        run: npx cap sync android

      - name: 디버그 APK 빌드
        working-directory: android-app/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon

      - name: APK 업로드(Artifacts)
        uses: actions/upload-artifact@v4
        with:
          name: coloring-app-debug-apk
          path: android-app/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
