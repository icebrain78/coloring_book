<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8b7cf6"/>
      <stop offset="1" stop-color="#5b4fd1"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.42" r="0.6">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#2a2170" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- 배경 -->
  <rect width="1024" height="1024" fill="url(#bg)"/>
  <rect width="1024" height="1024" fill="url(#glow)"/>

  <!-- 컬러 블룸(피어나는 색 꽃잎) -->
  <g filter="url(#soft)">
    <g>
      <ellipse cx="512" cy="336" rx="104" ry="176" fill="#ff6b81" transform="rotate(0 512 512)"/>
      <ellipse cx="512" cy="336" rx="104" ry="176" fill="#ffa94d" transform="rotate(60 512 512)"/>
      <ellipse cx="512" cy="336" rx="104" ry="176" fill="#ffd23f" transform="rotate(120 512 512)"/>
      <ellipse cx="512" cy="336" rx="104" ry="176" fill="#4fd1a5" transform="rotate(180 512 512)"/>
      <ellipse cx="512" cy="336" rx="104" ry="176" fill="#4aa3ff" transform="rotate(240 512 512)"/>
      <ellipse cx="512" cy="336" rx="104" ry="176" fill="#b088ff" transform="rotate(300 512 512)"/>
    </g>
    <!-- 가운데 물방울(물들임) -->
    <circle cx="512" cy="512" r="118" fill="#ffffff"/>
    <path d="M512 452 C548 500 566 528 566 556 a54 54 0 1 1 -108 0 C458 528 476 500 512 452 Z" fill="#6c5ce7"/>
  </g>
</svg>
